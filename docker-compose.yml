version: '3.9'

services:
  # =========================================================================
  # FastAPI Backend Service
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: housing-api
    ports:
      - "8000:8000"
    environment:
      # Python configuration
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      
      # AWS S3 Configuration (set in .env file)
      S3_BUCKET: ${S3_BUCKET:-housing-pricing-regression-data}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      # MLFlow Configuration (optional)
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://127.0.0.1:5000}
    
    volumes:
      # Mount models and data directories for persistence
      - ./models:/app/models
      - ./data:/app/data
    
    networks:
      - housing-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  # =========================================================================
  # Streamlit Frontend Service
  # =========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: housing-ui
    ports:
      - "8501:8501"
    environment:
      # Python configuration
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      
      # Streamlit configuration
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ENABLEXSRFPROTECTION: "false"
      STREAMLIT_SERVER_ENABLECORS: "true"
      
      # API Configuration - use backend service name for internal communication
      API_URL: ${API_URL:-http://localhost:8000/predict}
      
      # AWS S3 Configuration (set in .env file)
      S3_BUCKET: ${S3_BUCKET:-housing-pricing-regression-data}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    
    volumes:
      # Mount data directory for caching
      - ./data:/app/data
    
    depends_on:
      backend:
        condition: service_healthy
    
    networks:
      - housing-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

# ============================================================================
# Shared Network
# ============================================================================
networks:
  housing-network:
    driver: bridge

# ============================================================================
# Named Volumes (optional - for persistent storage)
# ============================================================================
volumes:
  models_volume:
    driver: local
  data_volume:
    driver: local
